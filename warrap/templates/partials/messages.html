{% if messages %}
<div id="toast-container"
     class="fixed top-24 right-4 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none">
  {% for message in messages %}
  <div class="toast-{{ message.tags }} pointer-events-auto
              flex items-start gap-3 px-4 py-3 rounded-btn border
              shadow-card animate-slide-up"
       role="alert"
       data-toast>
    <div class="flex-1 text-sm font-[450]">{{ message }}</div>
    <button onclick="this.closest('[data-toast]').remove()"
            class="flex-shrink-0 text-current opacity-50 hover:opacity-100 transition-opacity"
            aria-label="Dismiss">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  {% endfor %}
</div>

<script>
  // Auto-dismiss toasts after 5 seconds
  document.querySelectorAll('[data-toast]').forEach(el => {
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(20px)';
      el.style.transition = 'all 0.3s ease';
      setTimeout(() => el.remove(), 300);
    }, 5000);
  });
</script>
{% endif %}
