{% load i18n static %}
<footer class="bg-canvas border-t border-ink/10">
  <div class="max-w-content mx-auto px-6 py-7 flex flex-col sm:flex-row items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <img src="{% static 'icons/logo.png' %}" class="h-6 w-6 opacity-80" alt="Warrap Logo" />
      <span class="text-sm text-slate">Warrap · Advanced Web Dev Course · {% now "Y" %}</span>
    </div>

    <div class="flex items-center gap-6">
      <a href="{% url 'hustles:map' %}" class="text-sm text-slate hover:text-ink transition-colors">Map</a>
      <a href="{% url 'hustles:leaderboard' %}" class="text-sm text-slate hover:text-ink transition-colors">Leaderboard</a>
      <a href="https://github.com/Joel-Fah/advanced-web-exercises" target="_blank"
         class="text-sm text-slate hover:text-ink transition-colors">GitHub <i class="ri-external-link-line"></i></a>
    </div>

    <form action="{% url 'set_language' %}" method="post" class="flex items-center gap-2">
      {% csrf_token %}
      <input name="next" type="hidden" value="{{ request.get_full_path }}" />
      {% if LANGUAGE_CODE == 'en' %}
        <button name="language" value="fr" class="text-sm text-slate hover:text-ink transition-colors" aria-label="Switch to French">FR</button>
      {% else %}
        <button name="language" value="en" class="text-sm text-slate hover:text-ink transition-colors" aria-label="Passer en anglais">EN</button>
      {% endif %}
    </form>
  </div>
</footer>
