{% load i18n humanize %}
<a href="{% url 'hustles:task_detail' task.pk %}"
   class="block bg-white border border-ink/10 rounded-hero p-4 hover:shadow-card hover:-translate-y-0.5 transition-all duration-200 group">
  <div class="flex items-center gap-2 mb-3 flex-wrap">
    <span class="category-pill"><i class="ri-price-tag-3-line"></i>{{ task.get_category_display }}</span>
    <span class="category-pill status-{{ task.status }}"><i class="ri-checkbox-circle-line"></i>{{ task.get_status_display }}</span>
    {% if task.is_flash_gig %}
      <span class="category-pill bg-orange-50 text-signal border-signal/20"><i class="ri-flashlight-line"></i>Flash</span>
    {% endif %}
  </div>
  <p class="text-base font-medium text-ink group-hover:text-signal transition-colors leading-snug mb-3">
    {{ task.title }}
  </p>
  <div class="flex items-center justify-between text-sm text-slate gap-3">
    <span class="inline-flex items-center gap-1 min-w-0 truncate">
      <i class="ri-map-pin-line"></i>{{ task.neighborhood|default:"Nearby" }} · {{ task.created_at|naturalday }}
    </span>
    <span class="font-medium text-ink whitespace-nowrap">{{ task.pay_display }}</span>
  </div>
</a>
